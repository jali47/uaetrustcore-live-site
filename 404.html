<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#06111f">
  <title>Page Not Found | UAE TrustCore</title>
  <link rel="icon" href="assets/icon-32.png" type="image/png">
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    body{min-height:100vh;display:grid;place-items:center;color:#fff;background:radial-gradient(circle at 75% 20%,rgba(34,211,238,.18),transparent 28%),linear-gradient(145deg,#020611,#0a1f38)}
    .not-found{width:min(calc(100% - 32px),760px);padding:56px;border:1px solid rgba(255,255,255,.1);border-radius:30px;background:rgba(255,255,255,.05);text-align:center;box-shadow:0 30px 90px rgba(0,0,0,.3)}
    .not-found img{width:250px;margin:0 auto 26px}
    .not-found h1{font-size:clamp(42px,8vw,82px);margin-bottom:12px}
    .not-found p{color:#b5c6da;font-size:18px}
    .not-found .actions{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:28px}
  </style>
</head>
<body>
  <main class="not-found">
    <img src="assets/logo-wordmark-light.png" alt="UAE TrustCore">
    <h1>Page not found</h1>
    <p>The address may be incorrect or the page may have moved.</p>
    <div class="actions">
      <a class="button button-light" href="index.html">Return home</a>
      <a class="button button-outline-light" href="https://calendly.com/uaetrustcore/30min" target="_blank" rel="noopener noreferrer">Book a meeting</a>
    </div>
  </main>
</body>
</html>
